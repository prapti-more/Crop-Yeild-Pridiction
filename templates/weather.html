<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather Checker 🌦️</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background:url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')
            no-repeat center center fixed;

            background-size:cover;
            min-height:100vh;
        }

        .overlay{
            background:rgba(0,0,0,0.6);
            min-height:100vh;
            padding:40px;
        }

        .container{

            width:500px;
            max-width:95%;

            margin:auto;
            margin-top:50px;

            background:white;

            border-radius:15px;

            padding:30px;

            box-shadow:0px 0px 15px rgba(0,0,0,0.5);

            text-align:center;
        }

        h1{
            color:#2e7d32;
            margin-bottom:25px;
        }

        input[type="text"]{

            width:100%;
            padding:12px;

            border:2px solid #4CAF50;
            border-radius:8px;

            font-size:16px;

            margin-bottom:20px;
        }

        button{

            background:#4CAF50;
            color:white;

            border:none;

            padding:12px 25px;

            font-size:16px;

            border-radius:8px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{
            background:#2e7d32;
        }

        .weather-box{

            margin-top:25px;

            background:#e8f5e9;

            padding:20px;

            border-radius:10px;
        }

        .weather-box h2{
            color:#1b5e20;
            margin-bottom:15px;
        }

        .weather-box p{
            font-size:18px;
            margin:10px 0;
        }

        .error{

            margin-top:20px;
            color:red;
            font-size:18px;
        }

        .back{

            margin-top:25px;
        }

        .back a{

            text-decoration:none;
            color:#2e7d32;

            font-weight:bold;
        }

        .back a:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>🌦️ Weather Checker</h1>

            <form method="POST">

                <input 
                    type="text"
                    name="city"
                    placeholder="Enter city name"
                    required
                >

                <button type="submit">
                    Get Weather
                </button>

            </form>

            <!-- Weather Result -->

            {% if weather %}

                <div class="weather-box">

                    <h2>
                        Weather in {{ weather.city }}
                    </h2>

                    <p>
                        🌡️ Temperature :
                        {{ weather.temperature }} °C
                    </p>

                    <p>
                        💧 Humidity :
                        {{ weather.humidity }}%
                    </p>

                    <p>
                        ☁️ Description :
                        {{ weather.description }}
                    </p>

                </div>

            {% endif %}

            <!-- Error -->

            {% if error_message %}

                <div class="error">

                    {{ error_message }}

                </div>

            {% endif %}

            <div class="back">

                <a href="{{ url_for('dashboard') }}">
                    ← Back to Dashboard
                </a>

            </div>

        </div>

    </div>

</body>
</html>
