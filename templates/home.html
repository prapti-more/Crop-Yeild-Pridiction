<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Smart Crop Yield Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: url("{{ url_for('static', filename='images/farming_background.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .content {
            background: rgba(0, 0, 0, 0.65);
            padding: 50px 40px;
            border-radius: 20px;
            max-width: 750px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            animation: fadeIn 2s ease;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            font-weight: 700;
            text-transform: uppercase;
            color: #00ff99;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #f1f1f1;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 16px 36px;
            margin: 10px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #28a745, #218838);
            color: white;
            text-decoration: none;
            transition: 0.4s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            background: linear-gradient(45deg, #218838, #1e7e34);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            p {
                font-size: 1.2rem;
            }
            .btn {
                padding: 12px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="content">
        <h1>Smart Farming</h1>
        <p>Harness the Power of AI for Better Crop Yields 🌾🚀</p>
        <a href="/register" class="btn">Register</a>
        <a href="/login" class="btn">Login</a>
        <a href="{{ url_for('schemes') }}" class="btn">Government Schemes 📰</a>  <!-- Link to Government Schemes -->
    </div>

</body>
</html>
