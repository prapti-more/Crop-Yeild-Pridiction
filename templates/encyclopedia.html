<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Crop Encyclopedia 📚</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854")
            no-repeat center center fixed;

            background-size:cover;

            font-family:'Poppins', sans-serif;

            color:white;

            min-height:100vh;
        }

        .overlay{

            position:fixed;

            top:0;
            left:0;
            right:0;
            bottom:0;

            background:rgba(0,0,0,0.65);

            z-index:-1;
        }

        .container{

            max-width:1200px;

            margin:auto;

            padding:80px 20px;
        }

        h2{

            text-align:center;

            font-size:40px;

            color:#90ee90;

            margin-bottom:50px;

            text-shadow:2px 2px 8px rgba(0,0,0,0.7);
        }

        .card-container{

            display:flex;

            flex-wrap:wrap;

            justify-content:center;

            gap:30px;
        }

        .card{

            width:300px;

            background:rgba(0,128,0,0.75);

            border-radius:18px;

            padding:25px;

            box-shadow:0 5px 15px rgba(0,0,0,0.5);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-10px);

            box-shadow:0 10px 20px rgba(0,128,0,0.8);
        }

        .card h3{

            color:#FFD700;

            font-size:26px;

            margin-bottom:15px;
        }

        .card p{

            line-height:1.7;

            font-size:16px;
        }

        @media(max-width:768px){

            h2{

                font-size:32px;
            }

            .card{

                width:90%;
            }
        }

    </style>

</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <h2>Explore Crop Encyclopedia 🌾</h2>

        <div class="card-container">

            {% for crop in crops %}

                <div class="card">

                    <h3>

                        {{ crop.name }}

                    </h3>

                    <p>

                        {{ crop.description }}

                    </p>

                </div>

            {% endfor %}

        </div>

    </div>

</body>

</html>
