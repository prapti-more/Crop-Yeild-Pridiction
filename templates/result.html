<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="background">
    <div class="container">
        <div class="result">
            <h2>🌾 Prediction Result 🌾</h2>
            <p><strong>Current Crop Planted:</strong> {{ current_crop }}</p>
            <p><strong>Land Area:</strong> {{ land_area }} acres</p>
            <p><strong>Predicted Best Crop:</strong> {{ predicted_crop }}</p>
            <p><strong>Expected Yield:</strong> {{ predicted_yield }}</p>
        </div>
        <div class="grid">
            <a href="/predict" class="button">Predict Again</a>
            <a href="/dashboard" class="button red">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
