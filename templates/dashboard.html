<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard 🌾 - Crop Yield Prediction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url("https://images.unsplash.com/photo-1582284542200-b7c2ee5eafca?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80") no-repeat center center fixed;
      background-size: cover;
      color: white;
      min-height: 100vh;
    }

    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    .navbar {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.7);
      position: relative;
      z-index: 1;
    }

    .navbar h1 {
      font-size: 28px;
      color: #90ee90;
      letter-spacing: 1px;
    }

    .navbar a {
      color: white;
      margin-left: 25px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: color 0.3s;
    }

    .navbar a:hover {
      color: #00ffcc;
    }

    .container {
      text-align: center;
      padding: 120px 20px;
      background-color: rgba(0, 0, 0, 0.55);
      margin: 80px auto;
      max-width: 900px;
      border-radius: 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.7);
      animation: slideUp 1s ease;
      position: relative;
      z-index: 1;
    }

    .container h2 {
      font-size: 38px;
      margin-bottom: 20px;
      color: #00ff99;
    }

    .container p {
      font-size: 20px;
      margin-bottom: 40px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .buttons a {
      background: linear-gradient(45deg, #28a745, #218838);
      color: white;
      padding: 15px 30px;
      margin: 10px;
      text-decoration: none;
      font-size: 18px;
      border-radius: 10px;
      transition: background 0.3s, transform 0.3s;
      width: 220px;
      text-align: center;
    }

    .buttons a:hover {
      background: linear-gradient(45deg, #218838, #1e7e34);
      transform: scale(1.05);
    }

    @keyframes slideUp {
      from { transform: translateY(80px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .container {
        margin: 50px 20px;
        padding: 70px 20px;
      }
      .buttons a {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="navbar">
    <h1>Crop Yield Dashboard 🌾</h1>
    <div>
      <a href="{{ url_for('predict') }}">Predict</a>
      <a href="{{ url_for('history') }}">History</a>
      <a href="{{ url_for('chatbot') }}">Chatbot</a>
      <a href="{{ url_for('logout') }}">Logout</a>
    </div>
  </div>

  <div class="container">
    <h2>Welcome, {{ user }}!</h2>
    <p>Manage your farm predictions, discover insights, and explore useful tools!</p>

    <div class="buttons">
      <a href="{{ url_for('predict') }}">🌾 Predict Yield</a>
      <a href="{{ url_for('history') }}">📜 View History</a>
      <a href="{{ url_for('chatbot') }}">🤖 Ask AI Chatbot</a>
      <a href="{{ url_for('schemes') }}">📋 Govt. Schemes</a>
      <a href="{{ url_for('weather') }}">🌦️ Check Weather</a>
      <a href="{{ url_for('encyclopedia') }}">📚 Crop Encyclopedia</a>
      
    </div>
  </div>

</body>
</html>
