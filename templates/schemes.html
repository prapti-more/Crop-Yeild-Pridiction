<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Government Schemes 📰</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='styles.css') }}">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background:url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854")
            no-repeat center center fixed;

            background-size:cover;

            color:white;
        }

        .container{

            width:90%;

            max-width:1200px;

            margin:60px auto;

            padding:40px;

            background:rgba(0,0,0,0.75);

            border-radius:20px;

            box-shadow:0 5px 15px rgba(0,0,0,0.4);
        }

        h2{

            text-align:center;

            color:#90ee90;

            margin-bottom:30px;

            font-size:2.5rem;
        }

        .search-box{

            text-align:center;

            margin-bottom:30px;
        }

        .search-box input{

            width:60%;

            padding:12px;

            border:none;

            border-radius:10px;

            font-size:16px;
        }

        .search-box button{

            padding:12px 20px;

            border:none;

            border-radius:10px;

            background:green;

            color:white;

            font-size:16px;

            cursor:pointer;

            margin-left:10px;
        }

        .search-box button:hover{

            background:darkgreen;
        }

        .add-button{

            display:block;

            width:fit-content;

            margin:0 auto 40px auto;

            padding:12px 25px;

            background:#28a745;

            color:white;

            text-decoration:none;

            border-radius:30px;

            font-size:1.1rem;

            transition:0.3s;
        }

        .add-button:hover{

            background:#218838;

            transform:scale(1.05);
        }

        .card{

            background:rgba(0,128,0,0.85);

            padding:25px;

            border-radius:15px;

            margin-bottom:25px;

            box-shadow:0 4px 10px rgba(0,0,0,0.4);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-5px);

            box-shadow:0 8px 18px rgba(0,0,0,0.5);
        }

        .card h3{

            color:#FFD700;

            margin-bottom:12px;

            font-size:1.8rem;
        }

        .card p{

            font-size:1.1rem;

            line-height:1.6;
        }

        .empty{

            text-align:center;

            font-size:1.2rem;

            margin-top:30px;
        }

        @media(max-width:768px){

            .container{

                padding:20px;
            }

            h2{

                font-size:2rem;
            }

            .search-box input{

                width:100%;

                margin-bottom:10px;
            }

            .search-box button{

                width:100%;

                margin-left:0;
            }

            .card h3{

                font-size:1.5rem;
            }

            .card p{

                font-size:1rem;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>Latest Government Schemes For Farmers 📢</h2>

        <!-- SEARCH FORM -->

        <form method="POST" class="search-box">

            <input
                type="text"
                name="search"
                placeholder="Search Government Scheme..."
                value="{{ search }}"
            >

            <button type="submit">

                Search

            </button>

        </form>

        <!-- ADD SCHEME BUTTON -->

        <a href="{{ url_for('add_scheme') }}"
           class="add-button">

           ➕ Add New Scheme

        </a>

        <!-- DISPLAY SCHEMES -->

        {% if schemes %}

            {% for scheme in schemes %}

                <div class="card">

                    <h3>

                        {{ scheme.title }}

                    </h3>

                    <p>

                        {{ scheme.description }}

                    </p>

                </div>

            {% endfor %}

        {% else %}

            <p class="empty">

                No government schemes found.

            </p>

        {% endif %}

    </div>

</body>

</html>
