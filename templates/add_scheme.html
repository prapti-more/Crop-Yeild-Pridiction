<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Scheme</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0e0e10;
            color: #f1f1f1;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: #1c1c1f;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            width: 400px;
            max-width: 90%;
            animation: fadeIn 0.8s ease-in-out;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 25px;
            text-align: center;
            color: #61dafb;
        }
        label {
            font-size: 14px;
            color: #bbb;
            display: block;
            margin-bottom: 6px;
            text-align: left;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background: #2c2c30;
            color: #f1f1f1;
            font-size: 15px;
            transition: background 0.3s, transform 0.2s;
        }
        input[type="text"]:focus, textarea:focus {
            background: #333;
            transform: scale(1.02);
            outline: none;
        }
        button {
            width: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg, #0072ff, #00c6ff);
            transform: translateY(-2px);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1>Add New Scheme</h1>
        <form method="POST">
            <label for="title">Scheme Title</label>
            <input type="text" id="title" name="title" placeholder="Enter Scheme Title" required>

            <label for="description">Scheme Description</label>
            <textarea id="description" name="description" rows="5" placeholder="Enter Scheme Description" required></textarea>

            <button type="submit">Add Scheme</button>
        </form>
        <a class="back-link" href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
    </div>

</body>
</html>
