<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Crop Yield Prediction</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("https://images.unsplash.com/photo-1606115915099-6f70f7e5dddf") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
    }

    .login-box {
      width: 350px;
      padding: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      text-align: center;
      border-radius: 15px;
      color: #fff;
    }

    .login-box h2 {
      margin-bottom: 30px;
    }

    .login-box input[type="text"],
    .login-box input[type="password"] {
      border: none;
      outline: none;
      padding: 12px;
      width: 100%;
      margin: 10px 0;
      border-radius: 5px;
    }

    .login-box input[type="submit"] {
      border: none;
      outline: none;
      padding: 12px;
      width: 100%;
      background: #28a745;
      color: #fff;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .login-box input[type="submit"]:hover {
      background: #218838;
    }

    .error-message {
      color: red;
      margin-top: 10px;
    }

    .register-link {
      margin-top: 20px;
      display: block;
      color: #fff;
    }

    .register-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="Username" required><br>
      <input type="password" name="password" placeholder="Password" required><br>
      <input type="submit" value="Login">
      {% if error %}
        <div class="error-message">{{ error }}</div>
      {% endif %}
    </form>
    <a class="register-link" href="/register">Don't have an account? Register here</a>
  </div>
</body>
</html>
