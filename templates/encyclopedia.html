<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Crop Encyclopedia 📚</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854")
            no-repeat center center fixed;

            background-size:cover;

            font-family:'Poppins', sans-serif;

            color:white;

            min-height:100vh;
        }

        .overlay{

            position:fixed;

            top:0;
            left:0;
            right:0;
            bottom:0;

            background:rgba(0,0,0,0.65);

            z-index:-1;
        }

        .container{

            max-width:1200px;

            margin:auto;

            padding:80px 20px;
        }

        h2{

            text-align:center;

            font-size:40px;

            color:#90ee90;

            margin-bottom:50px;

            text-shadow:2px 2px 8px rgba(0,0,0,0.7);
        }

        .card-container{

            display:flex;

            flex-wrap:wrap;

            justify-content:center;

            gap:30px;
        }

        .card{

            width:320px;

            background:rgba(0,128,0,0.75);

            border-radius:18px;

            padding:25px;

            box-shadow:0 5px 15px rgba(0,0,0,0.5);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-10px);

            box-shadow:0 10px 20px rgba(0,128,0,0.8);
        }

        .card h3{

            color:#FFD700;

            font-size:28px;

            margin-bottom:15px;

            text-align:center;
        }

        .card p{

            line-height:1.8;

            font-size:16px;

            text-align:justify;
        }

        .button-box{

            text-align:center;

            margin-top:40px;
        }

        .btn{

            text-decoration:none;

            background:#4CAF50;

            color:white;

            padding:14px 28px;

            border-radius:10px;

            font-size:18px;

            transition:0.3s;
        }

        .btn:hover{

            background:#1b5e20;
        }

        footer{

            text-align:center;

            margin-top:50px;

            color:#ddd;

            font-size:15px;
        }

        @media(max-width:768px){

            h2{

                font-size:32px;
            }

            .card{

                width:95%;
            }
        }

    </style>

</head>

<body>

    <div class="overlay"></div>

    <div class="container">

        <h2>🌾 Explore Crop Encyclopedia 🌾</h2>

        <div class="card-container">

            {% for crop, description in crops.items() %}

                <div class="card">

                    <h3>

                        {{ crop }}

                    </h3>

                    <p>

                        {{ description }}

                    </p>

                </div>

            {% endfor %}

        </div>

        <div class="button-box">

            <a href="{{ url_for('dashboard') }}"
               class="btn">

               🏠 Back to Dashboard

            </a>

        </div>

        <footer>

            <p>

                © 2025 Crop Yield Prediction System

            </p>

        </footer>

    </div>

</body>

</html>
